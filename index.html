<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLU Code Quiz</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --panel: #ffffff;
            --text: #2d3748;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
        }

        /* Compact Layout Container */
        #quiz-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 360px;
        }

        /* 1. Timer / Stopwatch */
        #timer {
            font-size: 28px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            color: var(--primary);
            background: var(--panel);
            padding: 5px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: color 0.1s, transform 0.1s;
        }

        #timer.penalty {
            color: var(--error);
            transform: scale(1.1);
        }

        /* 2. Side-by-side Button Row */
        #button-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
        }

        .number-btn {
            flex: 1;
            height: 65px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
            transition: transform 0.1s;
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .correct {
            background-color: var(--success) !important;
            color: white !important;
            border-color: var(--success) !important;
        }

        .incorrect {
            background-color: var(--error) !important;
            color: white !important;
            border-color: var(--error) !important;
            animation: shake 0.2s ease;
        }

        /* 3. Product Display Card */
        #center-card {
            width: 100%;
            height: 240px;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        #item-image {
            max-width: 100%;
            max-height: 75%;
            object-fit: contain;
            border-radius: 8px;
            display: none;
        }

        #item-name {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            color: var(--text);
        }

        .game-over-card {
            background: var(--panel);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            box-sizing: border-box;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <div id="quiz-layout">
        <div id="timer">0.0s</div>

        <div id="button-row"></div>

        <div id="center-card">
            <img id="item-image" src="" alt="Item image">
            <div id="item-name">Loading...</div>
        </div>
    </div>

<script>
    const masterItemList = [
        { plu: "16", item: "Pomegranate" },
        { plu: "317", item: "Spring Onion" },
        { plu: "44", item: "Gaia Melon" },
        { plu: "45", item: "Honey Dew Melon" },
        { plu: "11", item: "Lime" },
        { plu: "95", item: "Baking Potatoes" },
        { plu: "24", item: "Sweet Potatoes" },
        { plu: "371", item: "Lemon" },
        { plu: "365", item: "Medium Avocado" },
        { plu: "366", item: "Large Avocado" },
        { plu: "367", item: "XL Avocado" },
        { plu: "43", item: "Mango" },
        { plu: "428", item: "Red Apple" },
        { plu: "147", item: "Water Melon" },
        { plu: "335", item: "Garlic" },
        { plu: "56", item: "Ginger" }
    ];

    let remainingPool = [...masterItemList];

    const layoutContainer = document.getElementById('quiz-layout');
    const buttonRow = document.getElementById('button-row');
    const itemImage = document.getElementById('item-image');
    const itemName = document.getElementById('item-name');
    const timerDisplay = document.getElementById('timer');

    let currentTask = null;
    let isRoundOver = false;
    
    // Stopwatch variables
    let startTime;
    let timerInterval;
    let penaltyTime = 0; // Accumulated penalty in milliseconds

    itemImage.onload = function() {
        this.style.display = 'block';
    };
    itemImage.onerror = function() {
        this.style.display = 'none';
    };

    function startTimer() {
        startTime = performance.now();
        timerInterval = setInterval(() => {
            // Actual time = elapsed real time + penalty time
            const elapsedTime = ((performance.now() - startTime) + penaltyTime) / 1000;
            timerDisplay.innerText = elapsedTime.toFixed(1) + 's';
        }, 100);
    }

    function stopTimer() {
        clearInterval(timerInterval);
    }

    function nextRound() {
        if (remainingPool.length === 0) {
            stopTimer();
            endGame();
            return;
        }

        isRoundOver = false;
        buttonRow.innerHTML = '';

        const randomIndex = Math.floor(Math.random() * remainingPool.length);
        currentTask = remainingPool.splice(randomIndex, 1)[0];
        
        itemName.innerText = currentTask.item;
        itemImage.src = `assets/pictures/${currentTask.plu}.png`;

        let options = [currentTask.plu];
        let wrongOptionsPool = masterItemList.filter(t => t.plu !== currentTask.plu);
        
        while (options.length < 4 && wrongOptionsPool.length > 0) {
            const randomWrongIndex = Math.floor(Math.random() * wrongOptionsPool.length);
            const selectedWrong = wrongOptionsPool.splice(randomWrongIndex, 1)[0];
            options.push(selectedWrong.plu);
        }

        // Shuffle options
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }

        // Render buttons horizontally
        options.forEach(pluCode => {
            const btn = document.createElement('button');
            btn.classList.add('number-btn');
            btn.innerText = pluCode;
            btn.addEventListener('click', () => checkAnswer(pluCode, btn));
            buttonRow.appendChild(btn);
        });
    }

    function checkAnswer(selectedPlu, btnElement) {
        if (isRoundOver) return;

        if (selectedPlu === currentTask.plu) {
            btnElement.classList.add('correct');
            isRoundOver = true;
            
            // Immediate transition to the next item
            setTimeout(nextRound, 200);
        } else {
            btnElement.classList.add('incorrect');
            
            // Add 1 second (1000ms) penalty
            penaltyTime += 1000;
            
            // Flash the timer in red to signal penalty
            timerDisplay.classList.add('penalty');
            
            setTimeout(() => {
                btnElement.classList.remove('incorrect');
                timerDisplay.classList.remove('penalty');
            }, 300);
        }
    }

    function endGame() {
        layoutContainer.innerHTML = `
            <div class="game-over-card">
                <h2>🏆 Quiz Completed!</h2>
                <p>Your final time including penalties:</p>
                <h3 style="font-size: 32px; color: var(--primary); margin: 15px 0;">${timerDisplay.innerText}</h3>
                <button onclick="location.reload()" style="margin-top: 15px; padding: 12px 24px; font-size: 16px; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">Play Again</button>
            </div>
        `;
    }

    // Start everything
    startTimer();
    nextRound();
</script>

</body>
</html>
